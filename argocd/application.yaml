apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idea-board
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nikhilmulinti/idea-board
    targetRevision: main
    path: argocd/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: ideaboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m