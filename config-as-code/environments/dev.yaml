global:
  domain: idea-board-dev.example.com
  namespace: idea-board-dev
  environment: development

backend:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/nikhilmulinti/idea-board-backend
    tag: develop
    pullPolicy: Always

  env: |
    - name: DATABASE_URL
      value: "postgresql://ideauser:ideapass@postgres-dev:5432/ideaboard_dev"
    - name: CORS_ORIGINS
      value: "https://idea-board-dev.example.com"
    - name: ENVIRONMENT
      value: "development"
    - name: DEBUG
      value: "true"
    - name: LOG_LEVEL
      value: "DEBUG"

  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

frontend:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/nikhilmulinti/idea-board-frontend
    tag: develop
    pullPolicy: Always

  env: |
    - name: REACT_APP_API_URL
      value: "https://idea-board-dev.example.com/api"
    - name: REACT_APP_ENVIRONMENT
      value: "development"
    - name: REACT_APP_DEBUG
      value: "true"

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-staging"
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - host: idea-board-dev.example.com
        paths:
          - path: /
            pathType: Prefix
          - path: /api
            pathType: Prefix
            backend: idea-board-backend
    tls:
      - secretName: idea-board-dev-tls
        hosts:
          - idea-board-dev.example.com

  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

postgresql:
  enabled: true
  auth:
    postgresPassword: postgres
    username: ideauser
    password: ideapass
    database: ideaboard_dev
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        memory: 256Mi
        cpu: 250m
      requests:
        memory: 128Mi
        cpu: 100m