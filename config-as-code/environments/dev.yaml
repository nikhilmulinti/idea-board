global:
  domain: simpletwist.dpdns.org
  namespace: idea-board
  environment: development

backend:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/nikhilmulinti/idea-board-backend
    tag: develop
    pullPolicy: Always

  env: |
    - name: DATABASE_URL
      value: "postgresql://ideauser:ChangeMeSecure123!@10.238.0.3:5432/ideaboard"
    - name: CORS_ORIGINS
      value: "https://simpletwist.dpdns.org"
    - name: ENVIRONMENT
      value: "development"
    - name: DEBUG
      value: "true"
    - name: LOG_LEVEL
      value: "DEBUG"

  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

frontend:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/nikhilmulinti/idea-board-frontend
    tag: develop
    pullPolicy: Always

  env: |
    - name: REACT_APP_API_URL
      value: "https://simpletwist.dpdns.org/api"
    - name: REACT_APP_ENVIRONMENT
      value: "development"
    - name: REACT_APP_DEBUG
      value: "true"

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: simpletwist.dpdns.org
        paths:
          - path: /
            pathType: Prefix
          - path: /api
            pathType: Prefix
            backend: idea-board-backend
    tls:
      - secretName: simpletwist-tls
        hosts:
          - simpletwist.dpdns.org

  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

postgresql:
  enabled: false  # Using Cloud SQL instead
  auth:
    postgresPassword: postgres
    username: ideauser
    password: ideapass
    database: ideaboard_dev
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        memory: 256Mi
        cpu: 250m
      requests:
        memory: 128Mi
        cpu: 100m