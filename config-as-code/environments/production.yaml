global:
  domain: idea-board.com
  namespace: idea-board-prod
  environment: production

backend:
  enabled: true
  replicas: 3
  image:
    repository: ghcr.io/nikhilmulinti/idea-board-backend
    tag: v1.0.0  # Use specific version tags in production
    pullPolicy: IfNotPresent

  env: |
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: idea-board-secrets
          key: database-url
    - name: CORS_ORIGINS
      value: "https://idea-board.com,https://www.idea-board.com"
    - name: ENVIRONMENT
      value: "production"
    - name: DEBUG
      value: "false"
    - name: LOG_LEVEL
      value: "WARNING"
    - name: SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: idea-board-secrets
          key: secret-key

  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 75

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - idea-board-backend
            topologyKey: kubernetes.io/hostname

frontend:
  enabled: true
  replicas: 3
  image:
    repository: ghcr.io/nikhilmulinti/idea-board-frontend
    tag: v1.0.0  # Use specific version tags in production
    pullPolicy: IfNotPresent

  env: |
    - name: REACT_APP_API_URL
      value: "https://api.idea-board.com"
    - name: REACT_APP_ENVIRONMENT
      value: "production"
    - name: REACT_APP_DEBUG
      value: "false"
    - name: REACT_APP_GA_ID
      valueFrom:
        configMapKeyRef:
          name: idea-board-config
          key: google-analytics-id

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "10m"
      nginx.ingress.kubernetes.io/rate-limit: "100"
    hosts:
      - host: idea-board.com
        paths:
          - path: /
            pathType: Prefix
      - host: www.idea-board.com
        paths:
          - path: /
            pathType: Prefix
      - host: api.idea-board.com
        paths:
          - path: /
            pathType: Prefix
            backend: idea-board-backend
    tls:
      - secretName: idea-board-prod-tls
        hosts:
          - idea-board.com
          - www.idea-board.com
          - api.idea-board.com

  resources:
    limits:
      cpu: 400m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - idea-board-frontend
            topologyKey: kubernetes.io/hostname

postgresql:
  enabled: false  # Use managed database service in production (RDS, Cloud SQL, etc.)

# External database configuration
externalDatabase:
  enabled: true
  type: "cloudsql"  # or "rds", "azure-database"
  connectionSecret: postgres-prod-secret

# Additional production configurations
monitoring:
  enabled: true
  prometheus:
    enabled: true
  grafana:
    enabled: true

backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: 30  # Keep 30 days of backups

security:
  networkPolicies:
    enabled: true
  podSecurityPolicy:
    enabled: true
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000