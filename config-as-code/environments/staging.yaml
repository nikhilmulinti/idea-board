global:
  domain: idea-board-staging.example.com
  namespace: idea-board-staging
  environment: staging

backend:
  enabled: true
  replicas: 2
  image:
    repository: ghcr.io/nikhilmulinti/idea-board-backend
    tag: main
    pullPolicy: Always

  env: |
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: idea-board-secrets
          key: database-url
    - name: CORS_ORIGINS
      value: "https://idea-board-staging.example.com"
    - name: ENVIRONMENT
      value: "staging"
    - name: DEBUG
      value: "false"
    - name: LOG_LEVEL
      value: "INFO"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

frontend:
  enabled: true
  replicas: 2
  image:
    repository: ghcr.io/nikhilmulinti/idea-board-frontend
    tag: main
    pullPolicy: Always

  env: |
    - name: REACT_APP_API_URL
      value: "https://idea-board-staging.example.com/api"
    - name: REACT_APP_ENVIRONMENT
      value: "staging"
    - name: REACT_APP_DEBUG
      value: "false"

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    hosts:
      - host: idea-board-staging.example.com
        paths:
          - path: /
            pathType: Prefix
          - path: /api
            pathType: Prefix
            backend: idea-board-backend
    tls:
      - secretName: idea-board-staging-tls
        hosts:
          - idea-board-staging.example.com

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

postgresql:
  enabled: true
  auth:
    existingSecret: postgres-staging-secret
    database: ideaboard_staging
  primary:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: fast-ssd
    resources:
      limits:
        memory: 512Mi
        cpu: 500m
      requests:
        memory: 256Mi
        cpu: 250m