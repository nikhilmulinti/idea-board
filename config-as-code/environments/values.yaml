# Environment-specific values for Idea Board application
# These values override the defaults in the individual chart values.yaml files

backend:
  replicaCount: 2
  image:
    tag: "latest"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

frontend:
  replicaCount: 2
  image:
    tag: "latest"
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi