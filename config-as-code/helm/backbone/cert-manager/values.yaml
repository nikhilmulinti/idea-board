cert-manager:
  # Install CRDs with Helm
  installCRDs: true

  # Namespace configuration
  global:
    rbac:
      create: true

  # Resource limits
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

  # Webhook configuration
  webhook:
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 32Mi

  # CAInjector configuration
  cainjector:
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 32Mi

  # Prometheus metrics
  prometheus:
    enabled: true
    servicemonitor:
      enabled: false  # Enable if using Prometheus Operator