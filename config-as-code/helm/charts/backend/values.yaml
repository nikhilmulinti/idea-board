replicaCount: 2

image:
  repository: ghcr.io/nikhilmulinti/idea-board-backend
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: simpletwist.dpdns.org
      paths:
        - path: /api
          pathType: Prefix
  tls:
    - secretName: simpletwist-api-tls
      hosts:
        - simpletwist.dpdns.org

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

env:
  DATABASE_HOST: ng-central-dev-server.postgres.database.azure.com
  DATABASE_PORT: "5432"
  DATABASE_NAME: ng-central-dev-db
  DATABASE_USER: ngadmin

secrets:
  DATABASE_PASSWORD: "ngdev@2024#"