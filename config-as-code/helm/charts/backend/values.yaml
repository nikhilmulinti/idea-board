namespace: idea-board

replicas: 1
appType: backend
image:
  repository: ghcr.io/nikhilmulinti/idea-board-backend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  protocol: TCP

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

env: |
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: idea-board-secrets
        key: database-url
  - name: CORS_ORIGINS
    value: "*"
  - name: ENVIRONMENT
    value: "production"

healthChecks:
  enabled: true
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 3

configMap:
  enabled: false

secrets:
  enabled: true
  name: idea-board-secrets

nodeSelector: {}
tolerations: []
affinity: {}