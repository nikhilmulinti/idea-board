repositories:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: jetstack
    url: https://charts.jetstack.io
  - name: bitnami
    url: https://charts.bitnami.com/bitnami

environments:
  dev:
    values:
      - environments/dev.yaml

releases:
  # Infrastructure components
  - name: ingress-nginx
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    version: 4.7.1
    createNamespace: true
    wait: true
    values:
      - controller:
          service:
            type: LoadBalancer
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi

  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: v1.12.0
    createNamespace: true
    wait: true
    values:
      - installCRDs: true
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
    hooks:
      - events: ["postsync"]
        command: "kubectl"
        args: ["apply", "-f", "helm/backbone/cert-manager/cluster-issuer.yaml"]

  # Application components
  - name: idea-board-backend
    namespace: idea-board
    chart: ./helm/charts/backend
    createNamespace: true
    needs:
      - ingress-nginx
    values:
      - environments/dev.yaml
    set:
      - name: backend.env
        value: |
          - name: DATABASE_URL
            value: "postgresql://ideauser:ChangeMeSecure123!@10.57.0.3:5432/ideaboard"
          - name: CORS_ORIGINS
            value: "https://simpletwist.dpdns.org"
          - name: ENVIRONMENT
            value: "development"

  - name: idea-board-frontend
    namespace: idea-board
    chart: ./helm/charts/frontend
    needs:
      - idea-board-backend
      - cert-manager
    values:
      - helm/frontend-override.yaml
    set:
      - name: env
        value: |
          - name: REACT_APP_API_URL
            value: "https://simpletwist.dpdns.org/api"
          - name: REACT_APP_ENVIRONMENT
            value: "development"