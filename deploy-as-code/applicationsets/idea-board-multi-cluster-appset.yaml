apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: idea-board-multi-cluster
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          # Environment and cluster configurations
          - list:
              elements:
                # Development - Same cluster as ArgoCD
                - env: dev
                  cluster: https://kubernetes.default.svc
                  clusterName: in-cluster
                  namespace: idea-board-dev
                  values: environments/dev.yaml
                  branch: develop
                  autoSync: true
                  prune: true

                # Staging - External GKE cluster
                - env: staging
                  cluster: https://gke-staging.example.com  # Replace with your staging cluster
                  clusterName: gke-staging
                  namespace: idea-board-staging
                  values: environments/staging.yaml
                  branch: main
                  autoSync: true
                  prune: true

                # Production - External GKE/EKS cluster
                - env: production
                  cluster: https://gke-production.example.com  # Replace with your prod cluster
                  clusterName: gke-production
                  namespace: idea-board-prod
                  values: environments/production.yaml
                  branch: main
                  autoSync: false
                  prune: false

          # Services to deploy
          - list:
              elements:
                - service: backend
                  chart: backend
                - service: frontend
                  chart: frontend

  template:
    metadata:
      name: '{{service}}-{{env}}-{{clusterName}}'
      namespace: argocd
      labels:
        app.kubernetes.io/name: '{{service}}'
        app.kubernetes.io/instance: '{{env}}'
        app.kubernetes.io/component: '{{service}}'
        app.kubernetes.io/part-of: idea-board
        environment: '{{env}}'
        cluster: '{{clusterName}}'

    spec:
      project: idea-board

      source:
        repoURL: https://github.com/nikhilmulinti/idea-board
        targetRevision: '{{branch}}'
        path: config-as-code/helm/charts/{{chart}}
        helm:
          valueFiles:
            - ../../{{values}}
          parameters:
            - name: image.tag
              value: '{{branch}}'
            - name: namespace
              value: '{{namespace}}'

      destination:
        server: '{{cluster}}'
        namespace: '{{namespace}}'

      syncPolicy:
        {{- if eq "true" .autoSync }}
        automated:
          prune: {{prune}}
          selfHeal: true
          allowEmpty: false
        {{- end }}
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

      revisionHistoryLimit: 3