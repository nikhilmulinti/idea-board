apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idea-board-app-of-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: idea-board

  source:
    repoURL: https://github.com/nikhilmulinti/idea-board
    targetRevision: main
    path: deploy-as-code

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 5