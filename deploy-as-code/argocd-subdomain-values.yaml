# ArgoCD Helm Values for subdomain: argocd.simpletwist.dpdns.org

# Global configurations
configs:
  params:
    server.insecure: true  # Required for HTTP ingress

server:
  # Insecure mode for ingress
  insecure: true

  # Configure ingress for subdomain
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - argocd.simpletwist.dpdns.org
    paths:
      - /
    pathType: Prefix
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.simpletwist.dpdns.org

# Disable unnecessary components for simpler setup
applicationSet:
  enabled: false

notifications:
  enabled: false

dex:
  enabled: false

# Single replica for demo
controller:
  replicas: 1

repoServer:
  replicas: 1