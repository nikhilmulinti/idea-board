# Production overrides for backend
backend:
  replicaCount: 3
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  env:
    DATABASE_HOST: "ng-central-dev-server.postgres.database.azure.com"
    DATABASE_NAME: "ng-central-dev-db"
    DATABASE_USER: "ngadmin"

# Production overrides for frontend
frontend:
  replicaCount: 3
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  env:
    REACT_APP_API_URL: "https://simpletwist.dpdns.org/api"