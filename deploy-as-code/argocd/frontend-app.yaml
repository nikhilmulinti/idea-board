apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: argocd
  annotations:
    # ArgoCD Image Updater annotations
    argocd-image-updater.argoproj.io/image-list: frontend=ghcr.io/nikhilmulinti/idea-board-frontend
    argocd-image-updater.argoproj.io/frontend.update-strategy: latest
    argocd-image-updater.argoproj.io/frontend.allow-tags: "main-*"  # Only track main-<sha> tags
    argocd-image-updater.argoproj.io/frontend.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/frontend.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nikhilmulinti/idea-board
    targetRevision: main
    path: config-as-code/helm/charts/frontend
    helm:
      releaseName: frontend
      valueFiles:
        - values.yaml
      parameters:
        - name: replicaCount
          value: "2"
        # image.tag removed - now managed by values.yaml and Image Updater
  destination:
    server: https://kubernetes.default.svc
    namespace: ideaboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m