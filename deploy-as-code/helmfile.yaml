# Main Helmfile - Orchestrates all components
environments:
  dev:
    values:
      - environments/dev.yaml

---

helmDefaults:
  wait: true
  timeout: 600
  createNamespace: true
  historyMax: 10

helmfiles:
  # Layer 1: Infrastructure (cert-manager, ingress)
  - path: helmfile.d/01-infrastructure.yaml
    values:
      - {{ toYaml .Values | nindent 8 }}

  # Layer 2: ArgoCD GitOps Platform
  - path: helmfile.d/02-argocd.yaml
    values:
      - {{ toYaml .Values | nindent 8 }}

  # Layer 3: Applications via ArgoCD
  - path: helmfile.d/03-applications.yaml
    values:
      - {{ toYaml .Values | nindent 8 }}