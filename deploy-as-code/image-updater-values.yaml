# ArgoCD Image Updater Values
# Cloud-agnostic configuration that works on AWS, GCP, Azure

config:
  # Connect to ArgoCD server in same cluster
  argocd:
    grpcWeb: true
    serverAddress: http://argocd-server.argocd.svc.cluster.local:80
    insecure: true
    plaintext: true

  # Log level for debugging
  logLevel: info

  # No registry config needed for public ghcr.io images
  registries: []

# Resource limits - small footprint
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Single replica is enough
replicaCount: 1